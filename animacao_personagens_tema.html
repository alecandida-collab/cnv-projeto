<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNV em Ação</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#EFEAE2;padding:24px 16px 40px;}
  .card{width:100%;max-width:680px;margin:0 auto;background:#F8F6F2;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
  .header{background:#1F1F1F;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;}
  .header-title{color:white;font-size:15px;font-weight:600;}
  .header-sub{color:rgba(255,255,255,0.6);font-size:12px;margin-top:2px;}
  .badge{background:rgba(255,255,255,0.12);color:white;font-size:11px;font-weight:600;padding:4px 12px;border-radius:99px;}
  .auto-bar{height:3px;background:rgba(0,0,0,0.08);}
  .auto-fill{height:100%;background:#6E7563;width:0%;}
  .stage{background:#EFEAE2;position:relative;height:260px;overflow:hidden;border-bottom:1px solid #D9D3C8;}
  .floor{position:absolute;bottom:0;left:0;right:0;height:60px;background:#D9D3C8;border-top:2px solid#C8C2B8;}
  .bg-window{position:absolute;top:20px;right:40px;width:80px;height:60px;background:#E8E2D8;border-radius:4px;border:2px solid#C8C2B8;}
  .bg-window::before{content:'';position:absolute;top:50%;left:0;right:0;height:2px;background:#C8C2B8;transform:translateY(-50%);}
  .bg-window::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;background:#C8C2B8;transform:translateX(-50%);}
  .bg-plant{position:absolute;bottom:58px;right:30px;font-size:32px;line-height:1;}
  .bg-desk{position:absolute;bottom:58px;left:50%;transform:translateX(-50%);width:120px;height:8px;background:#A8A28A;border-radius:4px;}
  .bg-desk::after{content:'';position:absolute;bottom:-30px;left:20px;width:8px;height:30px;background:#8A8472;border-radius:2px;box-shadow:72px 0 0 #8A8472;}
  .char{position:absolute;bottom:58px;display:flex;flex-direction:column;align-items:center;transition:transform 0.4s ease;}
  .char-left{left:60px;}
  .char-right{right:60px;}
  @keyframes bobble{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
  @keyframes bobble-right{0%,100%{transform:translateY(0) scaleX(-1);}50%{transform:translateY(-4px) scaleX(-1);}}
  .char-left.talking{animation:bobble 0.5s ease infinite;}
  .char-right{transform:scaleX(-1);}
  .char-right.talking{animation:bobble-right 0.5s ease infinite;}
  .char-right .char-name{transform:scaleX(-1);}
  .char-name{font-size:11px;font-weight:600;color:#4A4A4A;margin-top:4px;letter-spacing:0.04em;}
  .bubble{position:absolute;max-width:200px;background:#F8F6F2;border-radius:14px;padding:10px 14px;font-size:13px;line-height:1.45;color:#1F1F1F;box-shadow:0 2px 12px rgba(0,0,0,0.10);border:1.5px solid#D9D3C8;opacity:0;transform:translateY(6px);transition:opacity 0.35s ease,transform 0.35s ease;pointer-events:none;z-index:10;}
  .bubble.show{opacity:1;transform:translateY(0);}
  .bubble-left{left:130px;bottom:180px;}
  .bubble-left::after{content:'';position:absolute;bottom:-8px;left:16px;border:8px solid transparent;border-top-color:#F8F6F2;border-bottom:0;}
  .bubble-right{right:130px;bottom:180px;text-align:right;}
  .bubble-right::after{content:'';position:absolute;bottom:-8px;right:16px;border:8px solid transparent;border-top-color:#F8F6F2;border-bottom:0;}
  .bubble.bad{border-color:#E8B4B4;background:#FDF0F0;color:#8B2020;}
  .bubble.bad::after{border-top-color:#FDF0F0;}
  .bubble.good{border-color:#A8B89E;background:#EFF4EC;color:#2A4A22;}
  .bubble.good::after{border-top-color:#EFF4EC;}
  .panel{padding:20px 24px;background:#F8F6F2;}
  .scene-tag{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:3px 10px;border-radius:99px;display:inline-block;margin-bottom:8px;}
  .tag-bad{background:#F5E0E0;color:#8B2020;}
  .tag-good{background:#DDE8D8;color:#2A4A22;}
  .tag-neutral{background:#E8E2D8;color:#4A4A4A;}
  .scene-title{font-size:15px;font-weight:700;margin-bottom:6px;}
  .scene-title.bad{color:#8B2020;}
  .scene-title.good{color:#3A6148;}
  .scene-title.neutral{color:#1F1F1F;}
  .scene-text{font-size:14px;color:#4A4A4A;line-height:1.6;min-height:44px;margin-bottom:14px;}
  .dots{display:flex;gap:6px;justify-content:center;margin-bottom:14px;}
  .dot{width:8px;height:8px;border-radius:50%;background:#D9D3C8;transition:background 0.3s,transform 0.3s;}
  .dot.active{background:#6E7563;transform:scale(1.3);}
  .dot.done{background:#A8B89E;}
  .progress-bar{height:3px;background:#D9D3C8;border-radius:99px;margin-bottom:12px;overflow:hidden;}
  .progress-fill{height:100%;background:#6E7563;border-radius:99px;transition:width 0.4s ease;}
  .step-label{font-size:12px;color:#8A8472;text-align:center;margin-bottom:4px;}
  .controls{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s;}
  .btn:active{transform:scale(0.97);}
  .btn-prev{background:#E8E2D8;color:#4A4A4A;}
  .btn-prev:hover{background:#D9D3C8;}
  .btn-next{flex:1;background:#6E7563;color:white;}
  .btn-next:hover{background:#5A6151;}
  .btn-restart{flex:1;background:#EFF4EC;color:#3A6148;border:1.5px solid#A8B89E;}
  .btn-restart:hover{background:#DDE8D8;}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div>
      <div class="header-title">CNV em Ação</div>
      <div class="header-sub">Comunicação Não Violenta no trabalho</div>
    </div>
    <div class="badge" id="sceneBadge">Cena 1 de 8</div>
  </div>
  <div class="auto-bar"><div class="auto-fill" id="autoFill"></div></div>

  <div class="stage">
    <div class="bg-window"></div>
    <div class="bg-plant">🌿</div>
    <div class="bg-desk"></div>
    <div class="floor"></div>

    <!-- ANA -->
    <div class="char char-left" id="charLeft">
      <svg width="64" height="100" viewBox="0 0 64 100">
        <rect x="18" y="44" width="28" height="36" rx="6" fill="#6E7563"/>
        <rect x="6" y="46" width="12" height="8" rx="4" fill="#6E7563"/>
        <rect x="46" y="46" width="12" height="8" rx="4" fill="#6E7563"/>
        <rect x="20" y="76" width="10" height="20" rx="4" fill="#4A4F42"/>
        <rect x="34" y="76" width="10" height="20" rx="4" fill="#4A4F42"/>
        <rect x="28" y="36" width="8" height="10" rx="3" fill="#FBBF90"/>
        <circle cx="32" cy="26" r="18" fill="#FBBF90"/>
        <ellipse cx="32" cy="12" rx="18" ry="8" fill="#92400E"/>
        <rect x="14" y="12" width="6" height="16" rx="3" fill="#92400E"/>
        <rect x="44" y="12" width="6" height="16" rx="3" fill="#92400E"/>
        <circle cx="25" cy="26" r="3" fill="white"/>
        <circle cx="39" cy="26" r="3" fill="white"/>
        <circle cx="26" cy="27" r="1.5" fill="#1F1F1F"/>
        <circle cx="40" cy="27" r="1.5" fill="#1F1F1F"/>
        <path d="M27 33 Q32 37 37 33" stroke="#C2855A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="char-name">Ana</div>
    </div>

    <!-- CARLOS -->
    <div class="char char-right" id="charRight">
      <svg width="64" height="100" viewBox="0 0 64 100">
        <rect x="18" y="44" width="28" height="36" rx="6" fill="#5A6151"/>
        <rect x="6" y="46" width="12" height="8" rx="4" fill="#5A6151"/>
        <rect x="46" y="46" width="12" height="8" rx="4" fill="#5A6151"/>
        <rect x="20" y="76" width="10" height="20" rx="4" fill="#3A4034"/>
        <rect x="34" y="76" width="10" height="20" rx="4" fill="#3A4034"/>
        <rect x="28" y="36" width="8" height="10" rx="3" fill="#FBBF90"/>
        <circle cx="32" cy="26" r="18" fill="#FBBF90"/>
        <ellipse cx="32" cy="11" rx="18" ry="7" fill="#1C1917"/>
        <circle cx="25" cy="26" r="3" fill="white"/>
        <circle cx="39" cy="26" r="3" fill="white"/>
        <circle cx="26" cy="27" r="1.5" fill="#1F1F1F"/>
        <circle cx="40" cy="27" r="1.5" fill="#1F1F1F"/>
        <path d="M27 33 Q32 36 37 33" stroke="#C2855A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="char-name">Carlos</div>
    </div>

    <div class="bubble bubble-left" id="bubbleLeft"></div>
    <div class="bubble bubble-right" id="bubbleRight"></div>
  </div>

  <div class="panel">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:12.5%"></div></div>
    <div class="step-label" id="stepLabel">Cena 1 de 8</div>
    <div class="dots" id="dots"></div>
    <div class="scene-tag tag-neutral" id="sceneTag">Contexto</div>
    <div class="scene-title neutral" id="sceneTitle">Contexto</div>
    <div class="scene-text" id="sceneText">No trabalho, Carlos precisava que Ana entregasse um relatório. A entrega atrasou e ele ficou frustrado.</div>
    <div class="controls" id="controls">
      <button class="btn btn-prev" id="btnPrev" onclick="nav(-1)" disabled>←</button>
      <button class="btn btn-next" onclick="nav(1)">Próxima cena →</button>
    </div>
  </div>
</div>

<script>
var scenes=[
  {title:"Contexto",type:"neutral",tag:"tag-neutral",text:"No trabalho, Carlos precisava que Ana entregasse um relatório. A entrega atrasou e ele ficou frustrado.",speaker:"none",bubbleType:"",bubble:"",leftTalking:false,rightTalking:false},
  {title:"Reação impulsiva",type:"bad",tag:"tag-bad",text:"Carlos reage no impulso, sem pensar no impacto das suas palavras.",speaker:"right",bubbleType:"bad",bubble:'"Você nunca entrega nada no prazo! É sempre assim."',leftTalking:false,rightTalking:true},
  {title:"Reação de Ana",type:"bad",tag:"tag-bad",text:"Ana se sente atacada e parte para a defensiva. O conflito aumenta.",speaker:"left",bubbleType:"bad",bubble:'"Não é verdade! Você nunca reconhece meu esforço."',leftTalking:true,rightTalking:false},
  {title:"O resultado",type:"neutral",tag:"tag-neutral",text:"Nenhum problema foi resolvido. Ficou tensão, mágoa e afastamento entre os dois.",speaker:"none",bubbleType:"",bubble:"",leftTalking:false,rightTalking:false},
  {title:"Recomeçando com CNV",type:"neutral",tag:"tag-neutral",text:"Vamos ver como seria a mesma situação com CNV. Carlos para, respira e aplica os 4 passos.",speaker:"none",bubbleType:"",bubble:"",leftTalking:false,rightTalking:false},
  {title:"Observação + Sentimento",type:"good",tag:"tag-good",text:"Carlos descreve o fato sem julgamento e compartilha como se sentiu — sem culpar Ana.",speaker:"right",bubbleType:"good",bubble:'"Quando o relatório chega depois do prazo, fico preocupado com o projeto."',leftTalking:false,rightTalking:true},
  {title:"Necessidade + Pedido",type:"good",tag:"tag-good",text:"Carlos identifica o que precisa e faz um pedido claro e possível de ser atendido.",speaker:"right",bubbleType:"good",bubble:'"Preciso de previsibilidade. Você pode me avisar quando houver dificuldade?"',leftTalking:false,rightTalking:true},
  {title:"A resposta de Ana",type:"good",tag:"tag-good",text:"Ana se sente respeitada e responde com abertura. O diálogo se torna possível.",speaker:"left",bubbleType:"good",bubble:'"Claro, entendo. Tive dificuldades dessa vez. Próxima vez aviso antes."',leftTalking:true,rightTalking:false}
];
var cur=0,total=8,timer=null,DURATION=7000;
var dotsEl=document.getElementById('dots');
var fill=document.getElementById('autoFill');
for(var i=0;i<total;i++){var d=document.createElement('div');d.className='dot';d.id='dot'+i;dotsEl.appendChild(d);}
function render(){
  var s=scenes[cur];
  document.getElementById('sceneBadge').textContent='Cena '+(cur+1)+' de '+total;
  document.getElementById('stepLabel').textContent='Cena '+(cur+1)+' de '+total;
  document.getElementById('progressFill').style.width=((cur+1)/total*100)+'%';
  document.getElementById('sceneTag').className='scene-tag '+s.tag;
  document.getElementById('sceneTag').textContent=s.title;
  document.getElementById('sceneTitle').textContent=s.title;
  document.getElementById('sceneTitle').className='scene-title '+s.type;
  document.getElementById('sceneText').textContent=s.text;
  for(var i=0;i<total;i++){document.getElementById('dot'+i).className='dot'+(i===cur?' active':i<cur?' done':'');}
  var cl=document.getElementById('charLeft');
  var cr=document.getElementById('charRight');
  cl.className='char char-left'+(s.leftTalking?' talking':'');
  cr.className='char char-right'+(s.rightTalking?' talking':'');
  var bl=document.getElementById('bubbleLeft');
  var br=document.getElementById('bubbleRight');
  bl.className='bubble bubble-left';br.textContent='';
  br.className='bubble bubble-right';bl.textContent='';
  if(s.speaker==='left'){bl.textContent=s.bubble;bl.className='bubble bubble-left '+s.bubbleType;setTimeout(function(){bl.classList.add('show');},50);}
  else if(s.speaker==='right'){br.textContent=s.bubble;br.className='bubble bubble-right '+s.bubbleType;setTimeout(function(){br.classList.add('show');},50);}
  document.getElementById('btnPrev').disabled=cur===0;
  var ctrl=document.getElementById('controls');
  if(cur===total-1){ctrl.innerHTML='<button class="btn btn-prev" onclick="nav(-1)">← Voltar</button><button class="btn btn-restart" onclick="restart()">↺ Ver novamente</button>';}
  else{ctrl.innerHTML='<button class="btn btn-prev" id="btnPrev" onclick="nav(-1)"'+(cur===0?' disabled':'')+'>←</button><button class="btn btn-next" onclick="nav(1)">Próxima cena →</button>';}
  startAuto();
}
function nav(d){clearTimeout(timer);cur=Math.max(0,Math.min(total-1,cur+d));render();}
function restart(){cur=0;render();}
function startAuto(){
  clearTimeout(timer);
  fill.style.transition='none';fill.style.width='0%';
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    fill.style.transition='width '+DURATION+'ms linear';fill.style.width='100%';
  });});
  if(cur<total-1){timer=setTimeout(function(){nav(1);},DURATION);}
}
render();
</script>
</body>
</html>
